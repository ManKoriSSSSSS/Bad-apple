<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Apple!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: "Courier New", Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .modal-container {
            max-width: 700px;
            padding: 3rem;
            z-index: 10;
            border: 1px solid #333;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .modal-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #fff, #000, #fff);
            z-index: -1;
            opacity: 0.2;
        }

        .trigger-btn {
            position: relative;
            overflow: hidden;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            cursor: pointer;
        }

        .btn-accept:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        .btn-decline:hover {
            background-color: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        #videoPlayer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            object-fit: contain;
            z-index: 9999;
            filter: contrast(1.5) brightness(1.2);
        }

        .no-interaction {
            pointer-events: none;
            user-select: none;
        }

        h1 {
            text-shadow: 2px 2px 0px #333;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 11;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="consentModal" class="modal-container text-center">
        <h1 class="text-4xl font-bold mb-8 text-white">Bad apple launcher</h1>
        
        <p class="text-gray-300 text-sm mb-6">
            The following footage is a music video, click any button for video
        </p>

        <p class="text-gray-500 text-xs mb-12 italic border-l-2 border-white pl-4 text-left">
            Bad Apple may be unsustaible for people that have <br>
            <span class="font-bold text-white">high risk of photosensitive epileptic seizes.</span>
        </p>

        <div class="flex justify-center gap-6 mb-10">
            <button id="acceptBtn" class="trigger-btn btn-accept px-12 py-4 font-bold text-lg">
                Accept
            </button>
            <button id="declineBtn" class="trigger-btn btn-decline px-12 py-4 font-bold text-lg">
                Decline
            </button>
        </div>

        <a href="#" class="text-gray-600 text-xs hover:text-white transition-colors">Privacy policy</a>
    </div>

    <video id="videoPlayer" class="no-interaction" playsinline>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const buttons = document.querySelectorAll('.trigger-btn');
        const modal = document.getElementById('consentModal');
        const video = document.getElementById('videoPlayer');

        const triggerJumpscare = async () => {
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    await docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullscreen) {
                    await docElm.webkitRequestFullscreen();
                } else if (docElm.mozRequestFullScreen) {
                    await docElm.mozRequestFullScreen();
                }

                modal.style.display = 'none';
                video.style.display = 'block';
                video.volume = 1.0;
                video.play();

            } catch (err) {
                modal.style.display = 'none';
                video.style.display = 'block';
                video.volume = 1.0;
                video.play();
            }
        };

        buttons.forEach(btn => {
            btn.addEventListener('click', triggerJumpscare);
        });

        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
